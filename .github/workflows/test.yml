name: test

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install -e ".[test]"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  real-repositories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Fetch pinned ROS 2 repositories
        run: |
          python - <<'PY'
          import json
          import pathlib
          import subprocess

          manifest = json.loads(pathlib.Path("tests/real_repositories.json").read_text())
          for repository in manifest["repositories"]:
              path = pathlib.Path(repository["path"])
              path.mkdir(parents=True, exist_ok=True)
              subprocess.run(["git", "-C", str(path), "init", "--quiet"], check=True)
              subprocess.run(["git", "-C", str(path), "remote", "add", "origin", repository["url"]], check=True)
              subprocess.run(["git", "-C", str(path), "fetch", "--quiet", "--depth", "1", "origin", repository["revision"]], check=True)
              subprocess.run(["git", "-C", str(path), "checkout", "--quiet", "--detach", "FETCH_HEAD"], check=True)
          PY
      - name: Install test dependencies
        run: python -m pip install -e ".[test]"
      - name: Run real-repository regressions
        run: python tests/run_real_repository_regressions.py --require-all
      - name: Generate representative artifacts
        run: |
          robot-doctor-scan real_repositories/turtlebot4 --json --output /tmp/turtlebot4.json
          robot-doctor-overview real_repositories/turtlebot4 --output-dir /tmp/turtlebot4-overviews

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tooling
        run: python -m pip install build
      - name: Build wheel and source distribution
        run: python -m build
      - name: Verify wheel contents
        run: python tests/check_wheel.py dist/*.whl
      - name: Install and smoke-test wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          robot-doctor-scan tests/fixtures/python_robot --json --output /tmp/python-robot.json
          python -m robot_doctor --help
