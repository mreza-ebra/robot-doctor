name: test

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test dependencies
        run: python -m pip install -e ".[test]"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  real-repositories:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Fetch pinned ROS 2 repositories
        run: |
          python - <<'PY'
          import json
          import pathlib
          import subprocess

          manifest = json.loads(pathlib.Path("tests/real_repositories.json").read_text())
          for repository in manifest["repositories"]:
              path = pathlib.Path(repository["path"])
              path.mkdir(parents=True, exist_ok=True)
              subprocess.run(["git", "-C", str(path), "init", "--quiet"], check=True)
              subprocess.run(["git", "-C", str(path), "remote", "add", "origin", repository["url"]], check=True)
              subprocess.run(["git", "-C", str(path), "fetch", "--quiet", "--depth", "1", "origin", repository["revision"]], check=True)
              subprocess.run(["git", "-C", str(path), "checkout", "--quiet", "--detach", "FETCH_HEAD"], check=True)
          PY
      - name: Install test dependencies
        run: python -m pip install -e ".[test]"
      - name: Run real-repository regressions
        run: python tests/run_real_repository_regressions.py --require-all
      - name: Run manually labeled accuracy benchmark
        run: python tests/run_accuracy_benchmark.py --require-all --path turtlebot4=turtlebot4 --output /tmp/accuracy.json
      - name: Generate representative artifacts
        run: |
          robot-doctor-scan turtlebot4 --json --output /tmp/turtlebot4.json
          robot-doctor-overview turtlebot4 --output-dir /tmp/turtlebot4-overviews

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install build tooling
        run: python -m pip install build
      - name: Build wheel and source distribution
        run: python -m build
      - name: Verify wheel contents
        run: python tests/check_wheel.py dist/*.whl
      - name: Verify source distribution contents
        run: python tests/check_sdist.py dist/*.tar.gz
      - name: Install and smoke-test wheel
        run: |
          python -m pip install --force-reinstall dist/*.whl
          robot-doctor-scan tests/fixtures/python_robot --json --output /tmp/python-robot.json
          python -m robot_doctor --help
          robot-doctor-web --help

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and start local container
        run: docker compose up --build -d
      - name: Verify container health and page
        run: |
          docker compose exec -T robot-doctor sh -c 'test "$(id -u)" = "10001" && test "$(id -g)" = "10001"'
          for attempt in $(seq 1 60); do
            if curl --fail --silent http://127.0.0.1:8765/healthz >/dev/null; then
              curl --fail --silent http://127.0.0.1:8765/ | grep 'Scan repository'
              exit 0
            fi
            sleep 1
          done
          docker compose logs
          exit 1
      - name: Stop container
        if: always()
        run: docker compose down
