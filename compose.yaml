services:
  robot-doctor:
    build: .
    ports:
      - "127.0.0.1:8765:8765"
    read_only: true
    tmpfs:
      - /tmp:size=2G,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/healthz', timeout=2).read()"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
